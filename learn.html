<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcard</title>

  <style>

    body {
      font-family: Arial;
      background: #f2f2f2;
      text-align: center;
      margin: 0;
    }

    h1 {
      margin-top: 20px;
    }

    .card {
      width: 300px;
      height: 200px;
      margin: 40px auto;
      background: white;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    button {
      padding: 10px 20px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      background: #555;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }
  </style>
</head>

<body>

  <h1>Flashcard</h1>

  <div class="card" onclick="flipCard()" id="card">
    Click to start
  </div>

  <div>
    <button onclick="prevCard()">⬅ Prev</button>
    <button onclick="nextCard()">Next ➡</button>
  </div>
   
  <a href="index.html" class="home-btn">🏠 Home</a>
  <script>
    let user = localStorage.getItem("currentUser");

    if (!user) {
       alert("Please login first!");
       window.location.href = "login.html";
    }
    let cards = [
      { question: "Hello", answer: "Xin chào" },
      { question: "Goodbye", answer: "Tạm biệt" },
      { question: "Thank you", answer: "Cảm ơn" }
    ];

    let current = 0;
    let showingAnswer = false;

    function showCard() {
      let card = document.getElementById("card");
      if (showingAnswer) {
        card.innerText = cards[current].answer;
      } else {
        card.innerText = cards[current].question;
      }
    }

    function flipCard() {
      showingAnswer = !showingAnswer;
      showCard();
    }

    function nextCard() {
      current = (current + 1) % cards.length;
      showingAnswer = false;
      showCard();
    }

    function prevCard() {
      current = (current - 1 + cards.length) % cards.length;
      showingAnswer = false;
      showCard();
    }

    showCard();
  </script>

</body>
</html>
